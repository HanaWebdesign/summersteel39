<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music | サマースチル</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/music.css">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&display=swap" rel="stylesheet">
</head>

<body class="music-page fade-in">

  <header class="music-header">
    <section class="music-hero">
      <div class="hero-text">
        <p class="label">Summersteel Music</p>
        <h1>MUSIC</h1>
        <p>
          サマースチルの楽曲一覧。
        </p>
      </div>

      <div class="now-card">
        <div class="jacket">
          <img src="image/1.png" alt="サマースチル">
        </div>

        <div class="player-info">
          <p class="now-label">NOW PLAYING</p>
          <h2>サマースチル</h2>
          <p>Playlist Collection</p>

          <div class="player-buttons">
            <button>◀</button>
            <button class="play-btn">▶</button>
            <button>▶</button>
          </div>

          <div class="wave">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
          </div>

        </div>
      </div>
    </section>
  </header>

  <main class="music-main">

    <section class="playlist-title fade-in">
      <p>♪ Playlist</p>
      <h2>楽曲一覧</h2>
      <span>新曲が追加されると、自動で反映されます。</span>
    </section>

    <section class="music-gallery fade-in" id="music-gallery">
      <!-- 動画は js/script.js から自動で追加 -->
    </section>

    <div class="music-back">
      <a href="index.html">トップページに戻る</a>
    </div>

  </main>

  <footer>
    <div class="footer-flex">
      <div class="footer-copy">
        &copy; 2025 サマースチル
      </div>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
