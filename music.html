<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Music | サマースチル Official Site</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/music.css">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&display=swap" rel="stylesheet">
</head>

<body class="music-page">

  <header class="music-hero">
    <div class="music-hero__inner">

      <p class="music-label">Summersteel Music</p>

      <h1>Music</h1>

      <p class="music-copy">
        サマースチルの楽曲をまとめています。
      </p>

      <div class="now-playing">
        <div class="now-playing__jacket">
          <img src="image/1.png" alt="サマースチル">
        </div>

        <div class="now-playing__text">
          <p class="now-playing__label">Now Playing</p>
          <h2>サマースチル</h2>
          <p>playlist collection</p>

          <div class="wave">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>

    </div>
  </header>

  <main class="music-main">

    <section class="music-intro">
      <h2>Playlist</h2>
      <p>
        新曲が追加されると、自動でこの一覧にも反映されます。
      </p>
    </section>

    <section class="music-gallery fade-in" id="music-gallery">
      <!-- ここは空。動画は js/script.js から自動で追加される -->
    </section>

    <div class="music-back">
      <a href="index.html">トップページに戻る</a>
    </div>

  </main>

  <footer>
    <div class="footer-flex">
      <div class="footer-copy">
        &copy; 2025 サマースチル
      </div>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
